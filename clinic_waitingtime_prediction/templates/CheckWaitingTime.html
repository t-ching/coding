<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="static/css/main.css">
    <title>Indigo | Waiting time predictor</title>
</head>
<body>
    <img src="img/logo.svg" style="width: 100vw; height: auto; display: block; margin-left: -50px;">
    <br><br>
    <h1>Indigo Community Services and Health Hub | Waiting time predictor</h1>
    
    <form action="/show_waiting_time" method="post">
        <table>
            <tr>
                <td>
                    <label for="NumDoctorsOnDuty">No. of Doctors on Duty</label>
                </td>
                <td>
                    <select id="NumDoctorsOnDuty" name="NumDoctorsOnDuty" required style="width: 120px; height: 35px; box-sizing: border-box;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </td>
                
                <td style="width: 80px;"></td>  
                
                <td style="padding-right: 20px;">
                    <label for="NumReceptionistsOnDuty">No. of Receptionists on Duty</label>
                </td>
                <td>
                    <select id="NumReceptionistsOnDuty" name="NumReceptionistsOnDuty" required style="width: 120px; height: 35px; box-sizing: border-box;">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="Temperature">Temperature (deg. C)</label>
                </td>
                <td>
                    <input type="number" id="Temperature" name="Temperature" min="-50" max="50" step="0.1" value="19.2" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
                
                <td style="width: 80px;"></td>
                
                <td>
                    <label for="Rainfall">Rainfall (mm)</label>
                </td>
                <td>
                    <input type="number" id="Rainfall" name="Rainfall" min="0" max="1000" step="0.1" value="0" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="PctPriorVacantSlots">% Prior Vacant Slots</label>
                </td>
                <td>
                    <input type="number" id="PctPriorVacantSlots" name="PctPriorVacantSlots" min="0" max="100" step="0.1" value="0" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
                
                <td style="width: 80px;"></td>
                
                <td>
                    <label for="PriorEmergency">Prior Emergency</label>
                </td>
                <td>
                    <select id="PriorEmergency" name="PriorEmergency" required style="width: 120px; height: 35px; box-sizing: border-box;">
                        <option value="0" selected>No</option>
                        <option value="1">Yes</option>
                    </select>
                </td>
            </tr>

            <tr>
		<td style="padding-right: 20px;">
                    <label for="AvgDoctorExperience">Avg. Doctor Experience (yrs)</label>
                </td>
                <td>
                    <input type="number" id="AvgDoctorExperience" name="AvgDoctorExperience" min="0" step="0.1" value="5.8" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
                
                <td style="width: 80px;"></td>
                
                <td>
                    <label for="PctSwitch">% Willing to Switch</label>
                </td>
                <td>
                    <input type="number" id="PctSwitch" name="PctSwitch" min="0" max="100" step="0.1" value="26" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="AvgAgePrior">Avg. Age Prior Patients</label>
                </td>
                <td>
                    <input type="number" id="AvgAgePrior" name="AvgAgePrior" min="0" step="0.1" value="37.7" required style="width: 120px; height: 35px; box-sizing: border-box;">
                </td>
                
                <td style="width: 80px;"></td>
                
                <td></td>
                <td></td>
            </tr>
            
            <tr>
                <td colspan="5" style="padding-top: 20px;">
                    <input type="submit" value="Submit" style="height: 40px; width: 150px; cursor: pointer; font-weight: bold; background-color: var(--bs-primary, #B2301E); color: white; border: none; border-radius: var(--bs-border-radius, 4px);">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
